function cd(c1,c2){const[r1,g1,b1]=h2r(c1);const[r2,g2,b2]=h2r(c2);const rm=(r1+r2)/2;const dr=r1-r2,dg=g1-g2,db=b1-b2;return Math.sqrt((2+rm/256)*dr*dr+4*dg*dg+(2+(255-rm)/256)*db*db);}

function enhanceImage(srcCanvas, gw, gh){
  const sharpen=parseFloat(document.getElementById('sharpen').value);

  const brightness=parseFloat(document.getElementById('brightness').value);

  const ctx=c.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='medium';
  ctx.drawImage(srcCanvas,0,0,gw,gh);
  let px=ctx.getImageData(0,0,gw,gh);let d=px.data;

  // Step 2: Convolution sharpen (3x3 kernel approximation)
  if(sharpen>0.01){
    const orig=new Uint8ClampedArray(d);

    r=(r-128)*contrast+128;g=(g-128)*contrast+128;b=(b-128)*contrast+128;
    const lum=0.299*r+0.587*g+0.114*b;
    r=lum+saturation*(r-lum);g=lum+saturation*(g-lum);b=lum+saturation*(b-lum);
    d[i]=cl(r,0,255);d[i+1]=cl(g,0,255);d[i+2]=cl(b,0,255);
  }
  ctx.putImageData(px,0,0);
  return {canvas:c, pixels:d, w:gw, h:gh};
}

// ═══════════════ Floyd-Steinberg ═══════════════
function applyDither(pixels, w, h, palette){
  const dMode=document.getElementById('ditherMode').value;
  if(dMode==='none')return;

  if(dMode==='floyd'){
    const err=new Float32Array(w*h*3);const q=new Float32Array(w*h*3);
    for(let i=0;i<pixels.length;i++)q[i]=pixels[i];
    for(let y=0;y<h;y++){for(let x=0;x<w;x++){
      const idx=(y*w+x)*4;
      let r=cl(q[idx]+err[idx],0,255),g=cl(q[idx+1]+err[idx+1],0,255),b=cl(q[idx+2]+err[idx+2],0,255);
      const n=findClosest(r2h(r,g,b),palette);const[tr,tg,tb]=h2r(n.hex);
      const re=r-tr,ge=g-tg,be=b-tb;
      const de=(i,j,f)=>{if(i>=0&&i<w&&j>=0&&j<h){const ei=(j*w+i)*3;err[ei]+=re*f;err[ei+1]+=ge*f;err[ei+2]+=be*f}};
      de(x+1,y,7/16);de(x-1,y+1,3/16);de(x,y+1,5/16);de(x+1,y+1,1/16);
    }}
  }
  if(dMode==='ordered'){
    const bayer=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
    for(let y=0;y<h;y++){for(let x=0;x<w;x++){
      const idx=(y*w+x)*4;const t=(bayer[y%4][x%4]/16-0.5)*64;
      pixels[idx]=cl(pixels[idx]+t,0,255);pixels[idx+1]=cl(pixels[idx+1]+t,0,255);pixels[idx+2]=cl(pixels[idx+2]+t,0,255);
    }}
  }
}

// ═══════════════ Color matching ═══════════════
function findClosest(hex,palette){let best=palette[0],bd=Infinity;for(const c of palette){const d=cd(hex,c.hex);if(d<bd){bd=d;best=c}}return best;}

function limitPalette(palette,maxN){
  if(maxN<=0||maxN>=palette.length)return palette;
  const sel=[palette[0]];const rem=palette.slice(1);
  while(sel.length<maxN&&rem.length>0){
    let bi=0,bd=-1;
    for(let i=0;i<rem.length;i++){let md=Infinity;for(const s of sel){const d=cd(rem[i].hex,s.hex);if(d<md)md=d}if(md>bd){bd=md;bi=i}}
    sel.push(rem[bi]);rem.splice(bi,1);
  }
  return sel;
}

// ═══════════════ ══════ MAIN CONVERT ══════ ═══════════════
function doConvert(){
  if(!imgLoaded)return alert('请先上传图片！');
  const gridSize=document.getElementById('gridSize').value;
  const paletteKey=document.getElementById('palette').value;
  const maxColors=parseInt(document.getElementById('maxColors').value);
  const previewScale=parseInt(document.getElementById('previewScale').value);
  let palette=PALETTES[paletteKey];
  const{w:gw,h:gh}=getDims(gridSize);
  if(maxColors>0)palette=limitPalette(palette,maxColors);

  // ── 1. Draw source at target resolution, preserve aspect ──
  const src=document.createElement('canvas');src.width=gw;src.height=gh;
  const sCtx=src.getContext('2d');sCtx.imageSmoothingEnabled=true;sCtx.imageSmoothingQuality='high';
  const iAsp=imgLoaded.width/imgLoaded.height,gAsp=gw/gh;
  let sx=0,sy=0,sw=imgLoaded.width,sh=imgLoaded.height;
  if(iAsp>gAsp){sw=sh*gAsp;sx=(imgLoaded.width-sw)/2}else{sh=sw/gAsp;sy=(imgLoaded.height-sh)/2}
  sCtx.drawImage(imgLoaded,sx,sy,sw,sh,0,0,gw,gh);

  // ── 2. Enhance ──
  const pre=enhanceImage(src,gw,gh);
  enhancedPixels=new Uint8ClampedArray(pre.pixels);

  // ── 3. Dither ──
  applyDither(pre.pixels,gw,gh,palette);

  // ── 4. Map to bead colors ──
  beadData=[];const bCanvas=document.getElementById('beadCanvas');
  bCanvas.width=gw;bCanvas.height=gh;const bCtx=bCanvas.getContext('2d');bCtx.imageSmoothingEnabled=false;
  const colorCount={};
  for(let y=0;y<gh;y++){beadData[y]=[];for(let x=0;x<gw;x++){
    const idx=(y*gw+x)*4;const r=pre.pixels[idx],g=pre.pixels[idx+1],b=pre.pixels[idx+2];
    const c=findClosest(r2h(r,g,b),palette);beadData[y][x]=c;
    colorCount[c.name]=(colorCount[c.name]||0)+1;bCtx.fillStyle=c.hex;bCtx.fillRect(x,y,1,1);
  }}

  // ── 5. Previews ──
  const oCanvas=document.getElementById('originalCanvas');
  const oCtx=oCanvas.getContext('2d');
  oCanvas.width=gw*previewScale;oCanvas.height=gh*previewScale;oCtx.imageSmoothingEnabled=false;
  oCtx.drawImage(pre.canvas,0,0,gw*previewScale,gh*previewScale);

  bCanvas.style.width=(gw*previewScale)+'px';bCanvas.style.height=(gh*previewScale)+'px';
  oCanvas.style.width=(gw*previewScale)+'px';oCanvas.style.height=(gh*previewScale)+'px';

  document.getElementById('origMeta').textContent=gw+'×'+gh+' 像素 ｜ 放大 '+previewScale+'×';
  document.getElementById('beadMeta').textContent='每种颜色用1颗拼豆 ｜ '+gw+'×'+gh+' = '+(gw*gh)+' 颗';

  // ── 6. Show sections ──
  document.getElementById('previewSection').classList.remove('hidden');
  document.getElementById('legendSection').classList.remove('hidden');
  document.getElementById('gridSection').classList.remove('hidden');
  document.getElementById('beadSummary').classList.remove('hidden');
  document.getElementById('downloadGrid').disabled=false;
  document.getElementById('downloadPreview').disabled=false;

  const total=gw*gh;const cn=Object.keys(colorCount).length;
  document.getElementById('beadTotal').textContent=total+' 颗';
  document.getElementById('beadColorCount').textContent='使用 '+cn+' 种颜色 ｜ 底板 '+gw+'×'+gh;

  // Legend
  const un=[...new Set(beadData.flatMap(r=>r.map(c=>c.name)))];
  const sorted=palette.filter(c=>un.includes(c.name));
  document.getElementById('legendGrid').innerHTML=sorted.map(c=>
    '<div class="legend-item"><div class="legend-swatch" style="background:'+c.hex+'"></div><span class="legend-symbol">'+c.sym+'</span><span>'+c.name+'</span><span style="color:#999">×'+(colorCount[c.name]||0)+'</span></div>'
  ).join('');

  // Grids
  renderGrids(gw,gh);
  document.getElementById('gridTitle').textContent='📋 拼豆图纸 · '+gw+'×'+gh+'（照着符号一颗一颗摆）';
}

// ═══════════════ Grid renderers ═══════════════
function adjB(hex,pct){const[r,g,b]=h2r(hex);const m=v=>Math.min(255,Math.round(v*(100+pct)/100));return'rgb('+m(r)+','+m(g)+','+m(b)+')'}
function isDark(hex){const[r,g,b]=h2r(hex);return(r*0.299+g*0.587+b*0.114)<128}

function renderGrids(gw,gh){
  const cellPx=gw>98?16:gw>58?20:24;
  const style=`width:${cellPx}px;height:${cellPx}px;font-size:${Math.max(8,cellPx-10)}px;line-height:${cellPx}px`;

  // ── Symbol grid (with row/col headers) ──
  let sh='<div class="grid-table">';
  // Col headers
  sh+='<div class="row"><div class="cell row-header" style="width:'+(cellPx+2)+'px"></div>';
  for(let x=0;x<gw;x++)sh+=`<div class="cell col-header" style="width:${cellPx}px">${x+1}</div>`;sh+='</div>';
  for(let y=0;y<gh;y++){sh+='<div class="row">';sh+=`<div class="cell row-header" style="width:${cellPx+2}px">${y+1}</div>`;
    for(let x=0;x<gw;x++){const c=beadData[y][x];sh+=`<div class="cell" style="${style};background:${adjB(c.hex,80)};color:${isDark(c.hex)?'#fff':'#333'}">${c.sym}</div>`}sh+='</div>';}
  sh+='</div>';document.getElementById('gridSymbol').innerHTML=sh;

  // ── Color grid ──
  let ch='<div class="grid-table">';
  ch+='<div class="row"><div class="cell row-header" style="width:'+(cellPx+2)+'px"></div>';
  for(let x=0;x<gw;x++)ch+=`<div class="cell col-header" style="width:${cellPx}px">${x+1}</div>`;ch+='</div>';
  for(let y=0;y<gh;y++){ch+='<div class="row">';ch+=`<div class="cell row-header" style="width:${cellPx+2}px">${y+1}</div>`;
    for(let x=0;x<gw;x++)ch+=`<div class="cell" style="${style};background:${beadData[y][x].hex}"></div>`;ch+='</div>';}
  ch+='</div>';document.getElementById('gridColor').innerHTML=ch;

  // ── Number grid ──
  let nh='<div class="grid-table">';
  nh+='<div class="row"><div class="cell row-header" style="width:'+(cellPx+2)+'px"></div>';
  for(let x=0;x<gw;x++)nh+=`<div class="cell col-header" style="width:${cellPx}px">${x+1}</div>`;nh+='</div>';
  for(let y=0;y<gh;y++){nh+='<div class="row">';nh+=`<div class="cell row-header" style="width:${cellPx+2}px">${y+1}</div>`;
    for(let x=0;x<gw;x++){const c=beadData[y][x];const cd=c.code||c.sym;nh+=`<div class="cell" style="font-size:${Math.max(7,cellPx-12)}px;${style};background:${adjB(c.hex,80)};color:${isDark(c.hex)?'#fff':'#333'}">${cd}</div>`}nh+='</div>';}
  nh+='</div>';document.getElementById('gridNumber').innerHTML=nh;
}

// ═══════════════ Tabs ═══════════════
document.getElementById('gridTabs').addEventListener('click',e=>{
  if(!e.target.classList.contains('tab-btn'))return;
  const t=e.target.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');
  ['Symbol','Color','Number'].forEach(k=>document.getElementById('tab'+k).classList.add('hidden'));
  document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.remove('hidden');
});

// ═══════════════ Presets ═══════════════
document.querySelectorAll('.btn-preset').forEach(b=>b.addEventListener('click',e=>{
  const p=e.target.dataset.preset;
  const presets={
    cartoon:{sharpen:2.5,contrast:1.5,brightness:1.05,saturation:1.4,dither:'floyd',maxColors:'0'},
    photo:{sharpen:1.8,contrast:1.4,brightness:1.0,saturation:1.1,dither:'floyd',maxColors:'32'},
    sharp:{sharpen:4.0,contrast:2.0,brightness:1.1,saturation:1.0,dither:'floyd',maxColors:'0'},
    soft:{sharpen:0.5,contrast:1.1,brightness:1.0,saturation:1.2,dither:'floyd',maxColors:'0'},
    poster:{sharpen:2.0,contrast:2.2,brightness:1.0,saturation:1.6,dither:'ordered',maxColors:'16'},
  };
  const ps=presets[p];
  document.getElementById('sharpen').value=ps.sharpen;document.getElementById('sharpenVal').textContent=ps.sharpen;
  document.getElementById('contrast').value=ps.contrast;document.getElementById('contrastVal').textContent=ps.contrast;
  document.getElementById('brightness').value=ps.brightness;document.getElementById('brightnessVal').textContent=ps.brightness;
  document.getElementById('saturation').value=ps.saturation;document.getElementById('saturationVal').textContent=ps.saturation;
  document.getElementById('ditherMode').value=ps.dither;
  document.getElementById('maxColors').value=ps.maxColors;
  if(imgLoaded)doConvert();
}));

// ═══════════════ Downloads ═══════════════
document.getElementById('downloadPreview').addEventListener('click',()=>{
  if(!beadData)return;
  const b=document.getElementById('beadCanvas');const cs=14;
  const out=document.createElement('canvas');out.width=b.width*cs;out.height=b.height*cs;
  const ctx=out.getContext('2d');ctx.imageSmoothingEnabled=false;ctx.drawImage(b,0,0,out.width,out.height);
  const a=document.createElement('a');a.download='拼豆预览_'+b.width+'x'+b.height+'.png';a.href=out.toDataURL('image/png');a.click();
});

document.getElementById('downloadGrid').addEventListener('click',()=>{
  if(!beadData)return;const gh=beadData.length,gw=beadData[0].length;
  const cs=20,pad=16,lh=100,ch=18;
  const out=document.createElement('canvas');
  out.width=gw*cs+pad*2+30;out.height=gh*cs+pad*2+lh+ch;
  const ctx=out.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,out.width,out.height);

  // Draw grid with symbols
  for(let y=0;y<gh;y++){for(let x=0;x<gw;x++){
    const c=beadData[y][x];ctx.fillStyle=c.hex;ctx.fillRect(pad+30+x*cs,pad+ch+y*cs,cs-1,cs-1);
    ctx.fillStyle=isDark(c.hex)?'#fff':'#000';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.sym,pad+30+x*cs+cs/2,pad+ch+y*cs+cs/2);
  }}
  // Legend
  const un=[...new Set(beadData.flatMap(r=>r.map(c=>c.name)))];let lx=pad,ly=pad+gh*cs+ch+12;
  for(const name of un){const c=PALETTES[document.getElementById('palette').value].find(p=>p.name===name);if(!c)continue;
    ctx.fillStyle=c.hex;ctx.fillRect(lx,ly,14,14);ctx.fillStyle='#000';ctx.font='9px sans-serif';ctx.textAlign='left';
    ctx.fillText(c.sym+' '+c.name,lx+18,ly+11);lx+=ctx.measureText(c.sym+' '+c.name).width+26;if(lx>out.width-100){lx=pad;ly+=16}
  }
  const a=document.createElement('a');a.download='拼豆图纸_'+gw+'x'+gh+'.png';a.href=out.toDataURL('image/png');a.click();
});

// ═══════════════ Events ═══════════════
document.getElementById('convertBtn').addEventListener('click',doConvert);
['sharpen','contrast','brightness','saturation'].forEach(id=>{
  const el=document.getElementById(id),ve=document.getElementById(id+'Val');
  el.addEventListener('input',()=>{ve.textContent=el.value;if(imgLoaded)doConvert()});
});
['gridSize','palette','ditherMode','maxColors','previewScale'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{if(imgLoaded)doConvert()});
});

console.log('🧩 拼豆转换器 Pro 已就绪！');
