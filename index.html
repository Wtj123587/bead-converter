// ═══════════════════════════════════════════════
// 颜色距离计算
// ═══════════════════════════════════════════════
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function colorDistance(c1, c2) {
  const [r1,g1,b1] = hexToRgb(c1);
  const [r2,g2,b2] = hexToRgb(c2);
  const rMean = (r1 + r2) / 2;
  const dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
  return Math.sqrt((2+rMean/256)*dr*dr + 4*dg*dg + (2+(255-rMean)/256)*db*db);
}

function findClosestColor(hex, palette) {
  let best = palette[0], bestDist = Infinity;
  for (const c of palette) {
    const d = colorDistance(hex, c.hex);
    if (d < bestDist) { bestDist = d; best = c; }
  }
  return best;
}

// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
let beadData = null;  // 2D array of {colorObj}
let imageLoaded = null;

// ═══════════════════════════════════════════════
// Upload
// ═══════════════════════════════════════════════
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = '#ff6348'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = '#ffa502'; });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.style.borderColor = '#ffa502';
  const file = e.dataTransfer.files[0];
  if (file) loadImage(file);
});
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadImage(file);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => { imageLoaded = img; doConvert(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  uploadZone.querySelector('.icon').textContent = '✅';
  uploadZone.querySelector('h3').textContent = '图片已加载：' + file.name;
}

// ═══════════════════════════════════════════════
// Convert
// ═══════════════════════════════════════════════
function getGridDims(sizeStr) {
  if (sizeStr === '29x58') return { w: 29, h: 58 };
  const s = parseInt(sizeStr);
  return { w: s, h: s };
}

function doConvert() {
  if (!imageLoaded) return alert('请先上传图片！');

  const gridSize = document.getElementById('gridSize').value;
  const paletteKey = document.getElementById('palette').value;
  const palette = PALETTES[paletteKey];
  const { w: gw, h: gh } = getGridDims(gridSize);

  // Draw original preview
  const oCanvas = document.getElementById('originalCanvas');
  const oCtx = oCanvas.getContext('2d');
  const previewW = Math.min(400, gw * 15);
  const scale = previewW / gw;
  const previewH = gh * scale;
  oCanvas.width = previewW;
  oCanvas.height = previewH;
  oCtx.imageSmoothingEnabled = false;
  oCtx.drawImage(imageLoaded, 0, 0, gw, gh);

  // Draw bead preview
  const bCanvas = document.getElementById('beadCanvas');
  const bCtx = bCanvas.getContext('2d');
  bCanvas.width = gw;
  bCanvas.height = gh;

  // Map colors
  beadData = [];
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = gw;
  tmpCanvas.height = gh;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.imageSmoothingEnabled = true;
  tmpCtx.drawImage(imageLoaded, 0, 0, gw, gh);
  const imageData = tmpCtx.getImageData(0, 0, gw, gh);

  const colorCount = {};

  for (let y = 0; y < gh; y++) {
    beadData[y] = [];
    for (let x = 0; x < gw; x++) {
      const idx = (y * gw + x) * 4;
      const r = imageData.data[idx];
      const g = imageData.data[idx + 1];
      const b = imageData.data[idx + 2];
      const a = imageData.data[idx + 3];
      const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
      const closest = findClosestColor(hex, palette);
      beadData[y][x] = closest;

      // Count
      const key = closest.name;
      colorCount[key] = (colorCount[key] || 0) + 1;

      // Draw pixel
      bCtx.fillStyle = closest.hex;
      bCtx.fillRect(x, y, 1, 1);
    }
  }

  // Scale bead preview canvas for display
  bCanvas.style.width = previewW + 'px';
  bCanvas.style.height = previewH + 'px';
  oCanvas.style.width = previewW + 'px';
  oCanvas.style.height = previewH + 'px';

  // Show sections
  document.getElementById('previewSection').classList.remove('hidden');
  document.getElementById('legendSection').classList.remove('hidden');
  document.getElementById('gridSection').classList.remove('hidden');
  document.getElementById('beadSummary').classList.remove('hidden');

  // Bead total
  const total = Object.values(colorCount).reduce((a,b) => a + b, 0);
  document.getElementById('beadTotal').textContent = total + ' 颗';

  // Legend
  const usedColors = [...new Set(beadData.flatMap(r => r.map(c => c.name)))];
  const sortedColors = palette.filter(c => usedColors.includes(c.name));
  const legendGrid = document.getElementById('legendGrid');
  legendGrid.innerHTML = sortedColors.map(c => `
    <div class="legend-item">
      <div class="legend-swatch" style="background:${c.hex};"></div>
      <span class="legend-symbol">${c.sym}</span>
      <span>${c.name}</span>
      <span style="color:#999;">×${colorCount[c.name]||0}</span>
    </div>
  `).join('');

  // Render grids
  renderSymbolGrid(gw, gh);
  renderColorGrid(gw, gh);
  renderNumberGrid(gw, gh, palette);

  document.getElementById('gridTitle').textContent = `📋 拼豆图纸 · ${gw}×${gh}`;
}

// ═══════════════════════════════════════════════
// Grid Renderers
// ═══════════════════════════════════════════════
function renderSymbolGrid(gw, gh) {
  let html = '<div class="grid-table">';
  for (let y = 0; y < gh; y++) {
    html += '<div class="row">';
    for (let x = 0; x < gw; x++) {
      const c = beadData[y][x];
      html += `<div class="cell" style="background:${adjustBrightness(c.hex,90)};color:${isDark(c.hex)?'#fff':'#333'};">${c.sym}</div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('gridSymbol').innerHTML = html;
}

function renderColorGrid(gw, gh) {
  let html = '<div class="grid-table">';
  for (let y = 0; y < gh; y++) {
    html += '<div class="row">';
    for (let x = 0; x < gw; x++) {
      const c = beadData[y][x];
      html += `<div class="cell" style="background:${c.hex};"></div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('gridColor').innerHTML = html;
}

function renderNumberGrid(gw, gh, palette) {
  let html = '<div class="grid-table">';
  for (let y = 0; y < gh; y++) {
    html += '<div class="row">';
    for (let x = 0; x < gw; x++) {
      const c = beadData[y][x];
      const code = c.code || c.sym;
      html += `<div class="cell" style="font-size:9px;background:${adjustBrightness(c.hex,90)};color:${isDark(c.hex)?'#fff':'#333'};">${code}</div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('gridNumber').innerHTML = html;
}

function adjustBrightness(hex, pct) {
  const [r,g,b] = hexToRgb(hex);
  const mix = (v) => Math.min(255, Math.round(v * (100 + pct) / 100));
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

function isDark(hex) {
  const [r,g,b] = hexToRgb(hex);
  return (r*0.299 + g*0.587 + b*0.114) < 128;
}

// ═══════════════════════════════════════════════
// Tabs
// ═══════════════════════════════════════════════
document.getElementById('gridTabs').addEventListener('click', e => {
  if (!e.target.classList.contains('tab-btn')) return;
  const tab = e.target.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('tabSymbol').classList.add('hidden');
  document.getElementById('tabColor').classList.add('hidden');
  document.getElementById('tabNumber').classList.add('hidden');
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');
});

// ═══════════════════════════════════════════════
// Download
// ═══════════════════════════════════════════════
document.getElementById('downloadPreview').addEventListener('click', () => {
  if (!beadData) return alert('请先上传图片并转换！');
  const bCanvas = document.getElementById('beadCanvas');
  const outCanvas = document.createElement('canvas');
  const cellSize = 12;
  outCanvas.width = bCanvas.width * cellSize;
  outCanvas.height = bCanvas.height * cellSize;
  const ctx = outCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(bCanvas, 0, 0, outCanvas.width, outCanvas.height);
  const link = document.createElement('a');
  link.download = '拼豆预览图_' + bCanvas.width + 'x' + bCanvas.height + '.png';
  link.href = outCanvas.toDataURL('image/png');
  link.click();
});

document.getElementById('downloadGrid').addEventListener('click', () => {
  if (!beadData) return alert('请先上传图片并转换！');

  const gh = beadData.length, gw = beadData[0].length;
  const cellSize = 24, padding = 20;
  const legendH = 120;
  const outCanvas = document.createElement('canvas');
  outCanvas.width = gw * cellSize + padding * 2;
  outCanvas.height = gh * cellSize + padding * 2 + legendH;
  const ctx = outCanvas.getContext('2d');

  // White bg
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, outCanvas.width, outCanvas.height);

  // Draw grid
  for (let y = 0; y < gh; y++) {
    for (let x = 0; x < gw; x++) {
      ctx.fillStyle = beadData[y][x].hex;
      ctx.fillRect(padding + x*cellSize, padding + y*cellSize, cellSize-1, cellSize-1);
      ctx.fillStyle = isDark(beadData[y][x].hex) ? '#fff' : '#000';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(beadData[y][x].sym, padding + x*cellSize + cellSize/2, padding + y*cellSize + cellSize/2);
    }
  }

  // Legend
  const usedNames = [...new Set(beadData.flatMap(r => r.map(c => c.name)))];
  let lx = padding, ly = padding + gh*cellSize + 16;
  for (const name of usedNames) {
    const c = PALETTES[document.getElementById('palette').value].find(p => p.name === name);
    if (!c) continue;
    ctx.fillStyle = c.hex;
    ctx.fillRect(lx, ly, 14, 14);
    ctx.fillStyle = '#000';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(c.sym + ' ' + c.name, lx + 18, ly + 11);
    lx += ctx.measureText(c.sym + ' ' + c.name).width + 30;
    if (lx > outCanvas.width - 100) { lx = padding; ly += 20; }
  }

  const link = document.createElement('a');
  link.download = '拼豆图纸_' + gw + 'x' + gh + '.png';
  link.href = outCanvas.toDataURL('image/png');
  link.click();
});

// Convert button
document.getElementById('convertBtn').addEventListener('click', doConvert);

// Auto-convert on settings change
document.getElementById('gridSize').addEventListener('change', () => { if (imageLoaded) doConvert(); });
document.getElementById('palette').addEventListener('change', () => { if (imageLoaded) doConvert(); });

console.log('🧩 拼豆转换器已就绪！');
</script>
